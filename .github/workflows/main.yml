name: Gerar APK Diário da Sinara

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixando o código
        uses: actions/checkout@v4

      - name: 🐍 Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ☕ Configurando o Motor Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurando o Flutter Seguro
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: 📜 Assinando a Burocracia do Android
        run: yes | flutter doctor --android-licenses

      - name: 🔍 Verificando os Arquivos
        run: ls -R

      - name: 📦 Instalando as peças do App
        run: pip install flet==0.25.2 requests fpdf2

      - name: 🚀 Construindo o Aplicativo (Padrão Sericom)
        # Adicionei o comando --product para cravar o nome "Diário da Sinara" no ícone!
        run: flet build apk . --verbose --product "Diário da Sinara"

      - name: 📤 Salvando o APK Pronto!
        uses: actions/upload-artifact@v4
        with:
          name: Diario-da-Sinara-APK
          path: build/apk/**/*.apk
          
