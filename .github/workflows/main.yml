name: Gerar APK Diário da Joana

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar o Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: pip install flet requests

      - name: Compilar o APK Forçando Pacotes
        # A dica da Lumi da Sericom aplicada aqui:
        run: flet build apk --include-packages requests

      - name: Salvar o APK final
        uses: actions/upload-artifact@v4
        with:
          name: Diario-da-Joana-APK
          path: build/apk/
          
